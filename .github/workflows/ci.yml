name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check (no-fix)
        run: make check-nofix

      - name: Test (fast)
        run: make test

      - name: Test (all, including slow)
        run: make test-all
